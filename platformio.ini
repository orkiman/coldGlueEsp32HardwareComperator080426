; PlatformIO Project Configuration
; Cold Glue Controller - Main Controller (ESP32-S3-WROOM-1-N16R8)

[env:esp32s3_devkitc_n16r8]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino

; --- N16R8: 16 MB Flash, 8 MB PSRAM (octal) ---
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 16MB

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0   ; HMI talks to UART0 via CP2102, not USB-CDC
    -DCORE_DEBUG_LEVEL=0          ; no IDF logs on Serial (would corrupt NDJSON)
    -std=gnu++17
build_unflags = -std=gnu++11

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    bblanchon/ArduinoJson@^7.1.0
    adafruit/Adafruit MCP4728@^1.0.7
    adafruit/Adafruit BusIO@^1.16.1
